name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yaml kubernetes/ talos/

  kubeconform:
    name: Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | \
            tar xz -C /usr/local/bin

      - name: Download Flux CRDs
        run: |
          mkdir -p /tmp/flux-crds
          curl -sL https://github.com/fluxcd/flux2/releases/latest/download/crd-schemas.tar.gz | \
            tar xz -C /tmp/flux-crds

      - name: Validate Kubernetes manifests
        run: |
          find kubernetes -name '*.yaml' -not -name '*.sops.yaml' -print0 | \
            xargs -0 kubeconform \
              -strict \
              -ignore-missing-schemas \
              -schema-location default \
              -schema-location '/tmp/flux-crds/{{ .ResourceKind }}{{ .KindSuffix }}.json' \
              -summary

  flux-validate:
    name: Flux HelmReleases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Validate Flux manifests
        run: |
          echo "Validating Kustomizations..."
          find kubernetes -name 'kustomization.yaml' -exec dirname {} \; | while read dir; do
            echo "  → $dir"
            flux build kustomization test \
              --path="$dir" \
              --kustomization-file=/dev/null \
              --dry-run 2>/dev/null || echo "    (skipped - needs cluster context)"
          done
          echo "✅ Flux validation complete"

  renovate-validate:
    name: Renovate Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Renovate config
        run: |
          npx -y -p renovate -- renovate-config-validator .github/renovate.json

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy
        # Pinned to v0.69.3 — last version before CVE-2026-33634 supply-chain
        # compromise on v0.69.4/v0.69.5/v0.69.6.
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.3

      - name: Scan manifests for misconfigurations
        run: |
          trivy config kubernetes/ \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --skip-files '**/*.sops.yaml' \
            --ignorefile .trivyignore.yaml

      - name: Scan repo for leaked secrets
        run: |
          trivy fs kubernetes/ \
            --scanners secret \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --skip-files '**/*.sops.yaml' \
            --ignorefile .trivyignore.yaml

      - name: Scan container images from manifests
        run: |
          grep -rhE '^\s+image:\s+\S+' kubernetes/ \
            --include='*.yaml' --exclude='*.sops.yaml' \
            | awk '{print $2}' | tr -d '"' | sort -u > /tmp/images.txt
          echo "Images to scan:"
          cat /tmp/images.txt
          exit_code=0
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            echo "::group::Scanning $image"
            trivy image "$image" \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --ignore-unfixed \
              --no-progress \
              --ignorefile .trivyignore.yaml \
              || exit_code=$?
            echo "::endgroup::"
          done < /tmp/images.txt
          exit $exit_code

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [yaml-lint, kubeconform, renovate-validate, trivy]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.yaml-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.kubeconform.result }}" == "failure" ]] || \
             [[ "${{ needs.renovate-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.trivy.result }}" == "failure" ]]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
