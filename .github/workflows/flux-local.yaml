name: Flux Local

on:
  pull_request:
    branches: [main]
    paths:
      - "kubernetes/**"
  push:
    branches: [main]
    paths:
      - "kubernetes/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: fluxcd/flux2/action@main

      - uses: allenporter/flux-local/action/test@8.2.0
        with:
          path: kubernetes/flux
          enable-helm: true

  diff:
    name: Diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: fluxcd/flux2/action@main

      - uses: allenporter/flux-local/action/diff@8.2.0
        with:
          path: kubernetes/flux
          live-branch: main
