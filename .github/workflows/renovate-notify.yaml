name: Renovate Failure Notify

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  notify:
    name: Notify Discord on Renovate CI failure
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'renovate[bot]'
    steps:
      - name: Resolve PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          pr_json=$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/commits/${HEAD_SHA}/pulls")
          number=$(echo "$pr_json" | jq -r '.[0].number // empty')
          title=$(echo "$pr_json" | jq -r '.[0].title // empty')
          url=$(echo "$pr_json" | jq -r '.[0].html_url // empty')
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        if: steps.pr.outputs.number != ''
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set — skipping notification"
            exit 0
          fi
          payload=$(jq -n \
            --arg title "Renovate PR CI failure: #${PR_NUMBER} ${PR_TITLE}" \
            --arg pr_url "$PR_URL" \
            --arg run_url "$RUN_URL" \
            '{
              username: "Renovate CI",
              embeds: [{
                title: $title,
                url: $pr_url,
                color: 15158332,
                fields: [
                  {name: "Failed run", value: $run_url}
                ]
              }]
            }')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$payload" "$WEBHOOK_URL"
