misconfigurations:
  # Flux's bundled RBAC grants broad cluster access by design — it needs to
  # reconcile any resource across the cluster. This file is vendored from
  # upstream `gotk-components.yaml` and not a manifest we author.
  - id: KSV-0041
    paths:
      - "flux/flux-system/gotk-components.yaml"
  - id: KSV-0046
    paths:
      - "flux/flux-system/gotk-components.yaml"

  # Intel GPU plugin container has a full securityContext (readOnlyRootFilesystem,
  # allowPrivilegeEscalation: false, capabilities drop ALL, seccompProfile).
  # Trivy flags KSV-0118 because there is no pod-level securityContext, which
  # is a false positive here since all containers are properly restricted.
  - id: KSV-0118
    paths:
      - "infrastructure/controllers/intel-gpu-plugin/intel-gpu-plugin.yaml"

  # Authentik blueprints use `!Env AUTHENTIK_*_CLIENT_SECRET` syntax to inject
  # values from the authentik deployment's environment at load time — these are
  # not hardcoded secret values.
  - id: KSV-0109
    paths:
      - "apps/authentik/blueprints/homelab.yaml"
      # zigbee2mqtt ConfigMap uses ${ZIGBEE2MQTT_MQTT_PASSWORD} which Flux
      # resolves via postBuild.substituteFrom from cluster-secrets (SOPS) — not
      # a hardcoded credential.
      - "apps/home-automation/zigbee2mqtt/resources.yaml"
      # gaspard lightrag-config has MAX_TOKENS (LLM context size, not a secret).
      # LLM_BINDING_API_KEY is a placeholder string — keyword-only mode skips
      # the LLM call entirely.
      - "apps/gaspard/lightrag-config.yaml"

  # Containers that write to rootfs paths at runtime and need
  # readOnlyRootFilesystem: false until each writable path is identified and
  # backed by an emptyDir mount.
  #   - AdGuard Home: writes a few rootfs paths
  #   - DozerDB (Neo4j fork): writes /logs, /conf, /plugins and others
  #   - immich-postgres: vanilla Postgres image needs /var/run/postgresql, /tmp
  - id: KSV-0014
    paths:
      - "apps/adguard/adguard.yaml"
      - "apps/dozerdb/dozerdb.yaml"
      - "apps/immich/postgres.yaml"
