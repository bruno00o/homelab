apiVersion: autokuma.bigboot.dev/v1
kind: KumaEntity
metadata:
  name: adguard
  namespace: adguard
spec:
  config:
    type: http
    name: AdGuard Home
    url: https://adguard.${CLUSTER_DOMAIN}
    interval: 60
    ignore_tls: true
    accepted_statuscodes:
      - "200-299"
      - "300-399"
      - "400-499"
