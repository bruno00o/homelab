apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: aroma-public
  namespace: aroma
spec:
  endpoints:
    - dnsName: aroma.seilliebert.dev
      recordType: CNAME
      targets:
        - ${CF_TUNNEL_HOSTNAME}
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: pb-aroma.seilliebert.dev
      recordType: CNAME
      targets:
        - ${CF_TUNNEL_HOSTNAME}
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
