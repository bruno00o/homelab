---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aroma
  namespace: aroma
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https-aroma
  hostnames:
    - aroma.${CLUSTER_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: aroma-app
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pb-aroma
  namespace: aroma
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https-pb-aroma
  hostnames:
    - pb-aroma.${CLUSTER_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: aroma-pocketbase
          port: 8090
