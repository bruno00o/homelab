apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  homelab.yaml: |
    version: 1
    metadata:
      name: Homelab Configuration
    entries:
      # =====================================================
      # SECTION 1: GROUPS
      # =====================================================
      - model: authentik_core.group
        id: group-homelab-admins
        state: present
        identifiers:
          name: homelab-admins
        attrs:
          is_superuser: false

      - model: authentik_core.group
        id: group-homelab-users
        state: present
        identifiers:
          name: homelab-users
        attrs:
          is_superuser: false

      # =====================================================
      # SECTION 2: PROVIDERS
      # =====================================================

      # Proxy Providers (forward_single)
      - model: authentik_providers_proxy.proxyprovider
        id: provider-hubble
        state: present
        identifiers:
          name: Hubble Proxy
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://hubble.${CLUSTER_DOMAIN}
          internal_host: http://hubble-ui.kube-system.svc.cluster.local:80
          internal_host_ssl_validation: false

      - model: authentik_providers_proxy.proxyprovider
        id: provider-longhorn
        state: present
        identifiers:
          name: Longhorn Proxy
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://longhorn.${CLUSTER_DOMAIN}
          internal_host: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
          internal_host_ssl_validation: false

      - model: authentik_providers_proxy.proxyprovider
        id: provider-adguard
        state: present
        identifiers:
          name: AdGuard Proxy
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://adguard.${CLUSTER_DOMAIN}
          internal_host: http://adguard-web.adguard.svc.cluster.local:80
          internal_host_ssl_validation: false

      - model: authentik_providers_oauth2.oauth2provider
        id: provider-homarr-oidc
        state: present
        identifiers:
          name: Homarr OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: homarr
          client_secret: !Env AUTHENTIK_HOMARR_CLIENT_SECRET
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://homarr.${CLUSTER_DOMAIN}/api/auth/callback/oidc
            - matching_mode: strict
              url: https://homarr-merry.seilliebert.dev/api/auth/callback/oidc
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

      - model: authentik_providers_proxy.proxyprovider
        id: provider-frigate
        state: present
        identifiers:
          name: Frigate Proxy
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://frigate.${CLUSTER_DOMAIN}
          internal_host: http://frigate.home-automation.svc.cluster.local:5000
          internal_host_ssl_validation: false

      - model: authentik_providers_proxy.proxyprovider
        id: provider-zigbee2mqtt
        state: present
        identifiers:
          name: Zigbee2MQTT Proxy
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://zigbee2mqtt.${CLUSTER_DOMAIN}
          internal_host: http://zigbee2mqtt.home-automation.svc.cluster.local:8080
          internal_host_ssl_validation: false

      # Cloudflare Access (OIDC)
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-cloudflare-access
        state: present
        identifiers:
          name: Cloudflare Access
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: cloudflare-access
          client_secret: !Env AUTHENTIK_CLOUDFLARE_ACCESS_CLIENT_SECRET
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://bruno00o.cloudflareaccess.com/cdn-cgi/access/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

      # OAuth2 Providers (OIDC)
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-home-assistant-oidc
        state: present
        identifiers:
          name: Home Assistant OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: home-assistant
          client_secret: !Env AUTHENTIK_HA_CLIENT_SECRET
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://home-assistant.${CLUSTER_DOMAIN}/auth/oidc/callback
            - matching_mode: strict
              url: https://home-assistant-merry.seilliebert.dev/auth/oidc/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

      - model: authentik_providers_oauth2.oauth2provider
        id: provider-grafana-oidc
        state: present
        identifiers:
          name: Grafana OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: grafana
          client_secret: !Env AUTHENTIK_GRAFANA_CLIENT_SECRET
          redirect_uris:
            - matching_mode: strict
              url: https://grafana.${CLUSTER_DOMAIN}/login/generic_oauth
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

      # =====================================================
      # SECTION 3: APPLICATIONS
      # =====================================================

      # Policy: require-homelab-admins
      - model: authentik_policies_expression.expressionpolicy
        id: policy-require-admins
        state: present
        identifiers:
          name: require-homelab-admins
        attrs:
          expression: |
            return ak_is_group_member(request.user, name="homelab-admins")

      # Policy: require-homelab-users
      - model: authentik_policies_expression.expressionpolicy
        id: policy-require-users
        state: present
        identifiers:
          name: require-homelab-users
        attrs:
          expression: |
            return ak_is_group_member(request.user, name="homelab-admins") or ak_is_group_member(request.user, name="homelab-users")

      # Hubble (admins only)
      - model: authentik_core.application
        id: app-hubble
        state: present
        identifiers:
          slug: hubble
        attrs:
          name: Hubble
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Hubble Proxy]]
          meta_launch_url: https://hubble.${CLUSTER_DOMAIN}
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-hubble-admin
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, hubble]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-admins]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

      # Longhorn (admins only)
      - model: authentik_core.application
        id: app-longhorn
        state: present
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Longhorn Proxy]]
          meta_launch_url: https://longhorn.${CLUSTER_DOMAIN}
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-longhorn-admin
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, longhorn]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-admins]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

      # AdGuard (admins only)
      - model: authentik_core.application
        id: app-adguard
        state: present
        identifiers:
          slug: adguard
        attrs:
          name: AdGuard Home
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, AdGuard Proxy]]
          meta_launch_url: https://adguard.${CLUSTER_DOMAIN}
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-adguard-admin
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, adguard]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-admins]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

      # Homarr (all users, OIDC)
      - model: authentik_core.application
        id: app-homarr
        state: present
        identifiers:
          slug: homarr
        attrs:
          name: Homarr
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Homarr OIDC]]
          meta_launch_url: https://homarr.${CLUSTER_DOMAIN}
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-homarr-users
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, homarr]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-users]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

      # Home Assistant (all users, OIDC)
      - model: authentik_core.application
        id: app-home-assistant
        state: present
        identifiers:
          slug: home-assistant
        attrs:
          name: Home Assistant
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Home Assistant OIDC]]
          meta_launch_url: https://home-assistant.${CLUSTER_DOMAIN}/auth/oidc/redirect
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-home-assistant-users
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, home-assistant]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-users]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

          timeout: 30

      # Frigate (admins only)
      - model: authentik_core.application
        id: app-frigate
        state: present
        identifiers:
          slug: frigate
        attrs:
          name: Frigate
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Frigate Proxy]]
          meta_launch_url: https://frigate.${CLUSTER_DOMAIN}
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-frigate-admin
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, frigate]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-admins]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

      # Zigbee2MQTT (admins only)
      - model: authentik_core.application
        id: app-zigbee2mqtt
        state: present
        identifiers:
          slug: zigbee2mqtt
        attrs:
          name: Zigbee2MQTT
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Zigbee2MQTT Proxy]]
          meta_launch_url: https://zigbee2mqtt.${CLUSTER_DOMAIN}
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-zigbee2mqtt-admin
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, zigbee2mqtt]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-admins]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

      # Cloudflare Access (all users)
      - model: authentik_core.application
        id: app-cloudflare-access
        state: present
        identifiers:
          slug: cloudflare-access
        attrs:
          name: Cloudflare Access
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Cloudflare Access]]
          meta_launch_url: blank://blank
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-cloudflare-access-users
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, cloudflare-access]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-users]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

      # Grafana (admins only, OIDC)
      - model: authentik_core.application
        id: app-grafana
        state: present
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Grafana OIDC]]
          meta_launch_url: https://grafana.${CLUSTER_DOMAIN}
          policy_engine_mode: all

      - model: authentik_policies.policybinding
        id: binding-grafana-admin
        state: present
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, grafana]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-admins]]
        attrs:
          enabled: true
          negate: false
          timeout: 30

      # Cleanup: remove old orphaned bindings
      - model: authentik_policies.policybinding
        id: binding-homarr-admin
        state: absent
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, homarr]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-admins]]

      - model: authentik_policies.policybinding
        id: binding-home-assistant-admin
        state: absent
        identifiers:
          order: 0
          target: !Find [authentik_core.application, [slug, home-assistant]]
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, require-homelab-admins]]

      # =====================================================
      # SECTION 4: OUTPOST
      # =====================================================
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          type: proxy
          providers:
            - !Find [authentik_providers_proxy.proxyprovider, [name, Hubble Proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, Longhorn Proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, AdGuard Proxy]]

            - !Find [authentik_providers_proxy.proxyprovider, [name, Frigate Proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, Zigbee2MQTT Proxy]]
