apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: authentik-public
  namespace: authentik
spec:
  endpoints:
    - dnsName: auth.${PUBLIC_DOMAIN}
      recordType: CNAME
      targets:
        - ${CF_TUNNEL_HOSTNAME}
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
