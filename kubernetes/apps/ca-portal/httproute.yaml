apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ca-portal
  namespace: ca-portal
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: http-ca-portal
  hostnames:
    - ca.${CLUSTER_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ca-portal
          port: 8080
