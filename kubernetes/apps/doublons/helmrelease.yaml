apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: doublons
  namespace: doublons
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  values:
    controllers:
      doublons:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            # renovate: datasource=docker depName=zot.merry.home.arpa/doublons
            image:
              repository: zot.merry.home.arpa/doublons
              tag: "0.0.1"
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /
                port: 3000
              readiness:
                enabled: true
                type: HTTP
                path: /
                port: 3000
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      imagePullSecrets:
        - name: zot-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: doublons
        ports:
          http:
            port: 3000

    persistence:
      tmp:
        type: emptyDir
        sizeLimit: 64Mi
        globalMounts:
          - path: /tmp
