---
apiVersion: v1
kind: Service
metadata:
  name: dozerdb
  namespace: dozerdb
spec:
  type: LoadBalancer
  loadBalancerIP: ${LB_DOZERDB}
  selector:
    app.kubernetes.io/name: dozerdb
  ports:
    - name: http
      port: 7474
      targetPort: 7474
      protocol: TCP
    - name: bolt
      port: 7687
      targetPort: 7687
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: dozerdb-headless
  namespace: dozerdb
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: dozerdb
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dozerdb
  namespace: dozerdb
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  serviceName: dozerdb-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dozerdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dozerdb
        app.kubernetes.io/instance: dozerdb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dozerdb
          # renovate: datasource=docker depName=graphstack/dozerdb
          image: docker.io/graphstack/dozerdb:5.26.3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 7474
              protocol: TCP
            - name: bolt
              containerPort: 7687
              protocol: TCP
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: dozerdb-secrets
                  key: NEO4J_AUTH
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
            - name: NEO4J_server_memory_heap_initial__size
              value: "512m"
            - name: NEO4J_server_memory_heap_max__size
              value: "1g"
            - name: NEO4J_server_memory_pagecache_size
              value: "512m"
          livenessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ${DEFAULT_STORAGE_CLASS}
        resources:
          requests:
            storage: 20Gi
