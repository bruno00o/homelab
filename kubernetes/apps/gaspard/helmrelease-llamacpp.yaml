apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llamacpp
  namespace: gaspard
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  values:
    controllers:
      llamacpp:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            # renovate: datasource=docker depName=ghcr.io/ggml-org/llama.cpp
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-vulkan
            args:
              - --hf-repo
              - Qwen/Qwen3-Embedding-0.6B-GGUF
              - --hf-file
              - Qwen3-Embedding-0.6B-Q8_0.gguf
              - --embeddings
              - --pooling
              - last
              - --ctx-size
              - "4096"
              - --batch-size
              - "512"
              - --ubatch-size
              - "512"
              - --n-gpu-layers
              - "28"
              - --port
              - "1234"
              - --host
              - 0.0.0.0
            env:
              TZ: ${TIMEZONE}
              LLAMA_CACHE: /models
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /health
                port: 1234
              readiness:
                enabled: true
                type: HTTP
                path: /health
                port: 1234
              startup:
                enabled: true
                type: HTTP
                path: /health
                port: 1234
                spec:
                  failureThreshold: 60
                  periodSeconds: 5
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
                gpu.intel.com/i915: 1
              limits:
                cpu: "2"
                memory: 2Gi
                gpu.intel.com/i915: 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 44     # video
          - 109    # render
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: llamacpp
        ports:
          http:
            port: 1234

    persistence:
      models:
        storageClass: ${DEFAULT_STORAGE_CLASS}
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /models
      tmp:
        type: emptyDir
        sizeLimit: 256Mi
        globalMounts:
          - path: /tmp
