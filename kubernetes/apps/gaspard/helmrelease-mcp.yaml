apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp
  namespace: gaspard
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  values:
    controllers:
      mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            # renovate: datasource=docker depName=zot.merry.home.arpa/gaspard/mcp
            image:
              repository: zot.merry.home.arpa/gaspard/mcp
              tag: "0.1.0"
            env:
              TZ: ${TIMEZONE}
              LIGHTRAG_URL: "http://lightrag.gaspard.svc.cluster.local:9621"
              MCP_TRANSPORT: "streamable-http"
              MCP_HOST: "0.0.0.0"
              MCP_PORT: "8000"
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /health
                port: 8000
              readiness:
                enabled: true
                type: HTTP
                path: /health
                port: 8000
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      imagePullSecrets:
        - name: zot-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: mcp
        ports:
          http:
            port: 8000
