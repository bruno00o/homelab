apiVersion: v1
kind: ConfigMap
metadata:
  name: lightrag-config
  namespace: gaspard
data:
  HOST: "0.0.0.0"
  PORT: "9621"
  WORKSPACE: "gaspard"
  WORKING_DIR: "/app/data/rag_storage"
  INPUT_DIR: "/app/data/inputs"
  LOG_DIR: "/app/data"
  LIGHTRAG_KV_STORAGE: "RedisKVStorage"
  LIGHTRAG_DOC_STATUS_STORAGE: "RedisDocStatusStorage"
  LIGHTRAG_VECTOR_STORAGE: "QdrantVectorDBStorage"
  LIGHTRAG_GRAPH_STORAGE: "Neo4JStorage"
  QDRANT_URL: "http://qdrant.qdrant.svc.cluster.local:6333"
  NEO4J_URI: "bolt://dozerdb.dozerdb.svc.cluster.local:7687"
  NEO4J_USERNAME: "neo4j"
  NEO4J_DATABASE: "gaspard"
  EMBEDDING_BINDING: "openai"
  EMBEDDING_BINDING_HOST: "http://llamacpp.gaspard.svc.cluster.local:1234"
  EMBEDDING_MODEL: "text-embedding-qwen3-embedding-0.6b"
  EMBEDDING_DIM: "1024"
  LLM_BINDING: "openai"
  LLM_MODEL: "gpt-4o-mini"
  LLM_BINDING_API_KEY: "unused-keyword-only-mode"
  OPENAI_API_KEY: "unused-keyword-only-mode"
  TIMEOUT: "240"
  TEMPERATURE: "0"
  MAX_ASYNC: "4"
  MAX_TOKENS: "32768"
