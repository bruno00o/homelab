apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
data:
  # Seeded into the PVC at /opt/data/config.yaml by the init container ONLY if
  # the file does not already exist. After first boot Hermes owns this file at
  # runtime (it writes skills/memories/config to /opt/data by design), so edits
  # here only affect a fresh volume. Secrets (API keys) come from env, not here.
  config.yaml: |
    model:
      provider: openrouter
      default: minimax/minimax-m2.7
      base_url: ''
      api_mode: chat_completions
    # OpenRouter ":free" models are throttled upstream (shared pool) and 429
    # constantly — unusable for an always-on agent. Use paid models (cheap).
    # fallback_providers is the correct key (verified: Hermes switched to it live).
    fallback_providers:
      - provider: openrouter
        model: nousresearch/hermes-4-70b
