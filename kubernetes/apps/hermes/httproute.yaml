---
# Dashboard (9119) — routed through Authentik proxy (SSO, homelab-admins only)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes
  namespace: hermes
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https-hermes
  hostnames:
    - hermes.${CLUSTER_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
---
# API (8642) — direct to the pod, protected by API_SERVER_KEY (no Authentik)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes-api
  namespace: hermes
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https-hermes-api
  hostnames:
    - hermes-api.${CLUSTER_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hermes
          port: 8642
