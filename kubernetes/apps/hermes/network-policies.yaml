---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: hermes
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: hermes
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# API (8642) reachable directly from the gateway on the LAN.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-gateway
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hermes
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock: { cidr: 10.0.20.0/24 }
      ports:
        - { protocol: TCP, port: 8642 }
---
# Cross-node envoy proxy traffic (Cilium ingress identity) for the API route.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-proxy-ingress
  namespace: hermes
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: hermes
  ingress:
    - fromEntities: [ingress]
      toPorts:
        - ports:
            - { port: "8642", protocol: TCP }
---
# Dashboard (9119) reached by the Authentik embedded outpost (proxy mode).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-authentik
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hermes
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - { protocol: TCP, port: 9119 }
---
# Outbound to the internet for the LLM provider (OpenRouter, 443) and web tools.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-https
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hermes
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.244.0.0/16
              - 10.96.0.0/12
      ports:
        - { protocol: TCP, port: 443 }
---
# Talk to the self-hosted Matrix homeserver (Synapse) in-cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-matrix
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hermes
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: matrix
      ports:
        - { protocol: TCP, port: 8008 }
        - { protocol: TCP, port: 80 }
