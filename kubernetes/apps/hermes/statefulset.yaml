---
apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hermes
  ports:
    - name: api
      port: 8642
      targetPort: 8642
      protocol: TCP
    - name: dashboard
      port: 9119
      targetPort: 9119
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes
  namespace: hermes
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  serviceName: hermes
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Seed config.yaml into the PVC only if absent, so Hermes can still
        # own/modify it at runtime (the PVC is the source of truth for its state).
        - name: seed-config
          # renovate: datasource=docker depName=docker.io/nousresearch/hermes-agent
          image: docker.io/nousresearch/hermes-agent:sha-bec2250d2c8349fc85201bcd1aa39bcaa766a555
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - test -f /opt/data/config.yaml || cp /config-seed/config.yaml /opt/data/config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-seed
              mountPath: /config-seed
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: hermes
          # renovate: datasource=docker depName=docker.io/nousresearch/hermes-agent
          image: docker.io/nousresearch/hermes-agent:sha-bec2250d2c8349fc85201bcd1aa39bcaa766a555
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: TZ
              value: ${TIMEZONE}
            - name: HERMES_HEADLESS
              value: "1"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: 0.0.0.0
            - name: API_SERVER_CORS_ORIGINS
              value: "*"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: API_SERVER_KEY
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: OPENROUTER_API_KEY
            # Discord chat interface (outbound-only, no inbound ports needed).
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: DISCORD_BOT_TOKEN
            # Your Discord user ID (not a credential, but kept out of the public
            # repo); without it the bot denies everyone by default.
            - name: DISCORD_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: DISCORD_ALLOWED_USERS
            # Matrix chat interface (in-cluster, outbound-only). Token from secret.
            - name: MATRIX_HOMESERVER
              value: http://synapse.matrix.svc.cluster.local:8008
            - name: MATRIX_USER_ID
              value: "@hermes:matrix.merry.seilliebert.dev"
            - name: MATRIX_ALLOWED_USERS
              value: "@bruno:matrix.merry.seilliebert.dev"
            - name: MATRIX_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-matrix
                  key: MATRIX_ACCESS_TOKEN
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: config-seed
          configMap:
            name: hermes-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ${DEFAULT_STORAGE_CLASS}
        resources:
          requests:
            storage: 5Gi
