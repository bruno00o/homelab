apiVersion: autokuma.bigboot.dev/v1
kind: KumaEntity
metadata:
  name: frigate
  namespace: home-automation
spec:
  config:
    type: http
    name: Frigate
    url: https://frigate.${CLUSTER_DOMAIN}
    interval: 60
    ignore_tls: true
    accepted_statuscodes:
      - "200-299"
      - "300-399"
      - "400-499"
    notification_name_list:
      - discord
