apiVersion: autokuma.bigboot.dev/v1
kind: KumaEntity
metadata:
  name: home-assistant
  namespace: home-automation
spec:
  config:
    type: http
    name: Home Assistant
    url: https://home-assistant.${CLUSTER_DOMAIN}
    interval: 60
    ignore_tls: true
    accepted_statuscodes:
      - "200-299"
      - "300-399"
      - "400-499"
