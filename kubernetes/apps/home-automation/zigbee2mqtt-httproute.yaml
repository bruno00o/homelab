apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zigbee2mqtt
  namespace: home-automation
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https-zigbee2mqtt
  hostnames:
    - zigbee2mqtt.${CLUSTER_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
