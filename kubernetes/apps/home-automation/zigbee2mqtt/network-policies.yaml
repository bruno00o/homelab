---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-zigbee2mqtt-ingress-from-gateway
  namespace: home-automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.20.0/24
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-zigbee2mqtt-gateway-proxy-ingress
  namespace: home-automation
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-zigbee2mqtt-from-authentik
  namespace: home-automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-zigbee2mqtt-to-mosquitto
  namespace: home-automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mosquitto
      ports:
        - protocol: TCP
          port: 1883
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-zigbee2mqtt-ser2net-egress
  namespace: home-automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.20.17/32
      ports:
        - protocol: TCP
          port: 20108
