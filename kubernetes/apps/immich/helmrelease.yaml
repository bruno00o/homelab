apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  timeout: 15m

  chart:
    spec:
      chart: immich
      version: "0.11.1"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      interval: 1h

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  uninstall:
    keepHistory: false

  values:
    # Shared defaults across server + machine-learning components
    controllers:
      main:
        containers:
          main:
            image:
              # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server
              tag: v2.7.5
            env:
              TZ: ${TIMEZONE}
              DB_HOSTNAME: immich-postgres.immich.svc.cluster.local
              DB_PORT: "5432"
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-credentials
                    key: database
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-credentials
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-credentials
                    key: password
              DB_VECTOR_EXTENSION: vectorchord
              REDIS_HOSTNAME: valkey.valkey-system.svc.cluster.local
              REDIS_PORT: "6379"
              REDIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: valkey-auth
                    key: password
              IMMICH_LOG_LEVEL: log

    immich:
      persistence:
        library:
          existingClaim: immich-library-nfs

    server:
      enabled: true
      controllers:
        main:
          annotations:
            reloader.stakater.com/auto: "true"
          containers:
            main:
              env:
                LIBVA_DRIVER_NAME: iHD
                NODE_EXTRA_CA_CERTS: /certs/ca.crt
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
              probes:
                liveness:
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      path: /api/server/ping
                      port: 2283
                    initialDelaySeconds: 60
                    periodSeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 5
                readiness:
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      path: /api/server/ping
                      port: 2283
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                startup:
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      path: /api/server/ping
                      port: 2283
                    failureThreshold: 30
                    periodSeconds: 10
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                  gpu.intel.com/i915: "1"
                limits:
                  cpu: 4000m
                  memory: 4Gi
                  gpu.intel.com/i915: "1"
      defaultPodOptions:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
      persistence:
        ca-cert:
          type: secret
          name: immich-tls
          globalMounts:
            - path: /certs/ca.crt
              subPath: ca.crt
              readOnly: true
      service:
        main:
          ports:
            http:
              port: 2283

    machine-learning:
      enabled: true
      controllers:
        main:
          annotations:
            reloader.stakater.com/auto: "true"
          containers:
            main:
              image:
                # renovate: datasource=docker depName=ghcr.io/immich-app/immich-machine-learning
                tag: v2.7.5-openvino
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
              probes:
                liveness:
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      path: /ping
                      port: 3003
                    initialDelaySeconds: 60
                    periodSeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 5
                readiness:
                  enabled: true
                  custom: true
                  spec:
                    httpGet:
                      path: /ping
                      port: 3003
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                  gpu.intel.com/i915: "1"
                limits:
                  cpu: 4000m
                  memory: 4Gi
                  gpu.intel.com/i915: "1"
      defaultPodOptions:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          size: 10Gi
          accessMode: ReadWriteOnce
          storageClass: ${DEFAULT_STORAGE_CLASS}
      service:
        main:
          ports:
            http:
              port: 3003
