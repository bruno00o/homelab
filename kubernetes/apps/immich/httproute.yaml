apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
  namespace: immich
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https-immich
    - name: internal-gateway
      namespace: kube-system
      sectionName: https-merry-wildcard
  hostnames:
    - immich.${CLUSTER_DOMAIN}
    - immich.${PUBLIC_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: immich-server
          port: 2283
