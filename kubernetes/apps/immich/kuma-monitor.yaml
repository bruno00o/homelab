apiVersion: autokuma.bigboot.dev/v1
kind: KumaEntity
metadata:
  name: immich
  namespace: immich
spec:
  config:
    type: http
    name: Immich
    url: https://immich.${CLUSTER_DOMAIN}/api/server/ping
    interval: 60
    ignore_tls: true
    accepted_statuscodes:
      - "200-299"
    notification_name_list:
      - discord
