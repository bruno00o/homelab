apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: matrix-public
  namespace: matrix
spec:
  endpoints:
    - dnsName: matrix.${PUBLIC_DOMAIN}
      recordType: CNAME
      targets:
        - ${CF_TUNNEL_HOSTNAME}
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: element.${PUBLIC_DOMAIN}
      recordType: CNAME
      targets:
        - ${CF_TUNNEL_HOSTNAME}
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
