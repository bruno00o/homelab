---
apiVersion: v1
kind: ConfigMap
metadata:
  name: element-config
  namespace: matrix
data:
  config.json: |
    {
      "default_server_config": {
        "m.homeserver": {
          "base_url": "https://matrix.merry.seilliebert.dev",
          "server_name": "matrix.merry.seilliebert.dev"
        }
      },
      "disable_custom_urls": true,
      "disable_guests": true,
      "brand": "Element"
    }
---
apiVersion: v1
kind: Service
metadata:
  name: element
  namespace: matrix
  labels:
    app.kubernetes.io/name: element
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: element
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: element
  namespace: matrix
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: element
  template:
    metadata:
      labels:
        app.kubernetes.io/name: element
    spec:
      containers:
        - name: element
          # renovate: datasource=docker depName=ghcr.io/element-hq/element-web
          image: ghcr.io/element-hq/element-web:v1.12.18
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
      volumes:
        - name: config
          configMap:
            name: element-config
