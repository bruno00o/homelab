---
apiVersion: v1
kind: Service
metadata:
  name: mas
  namespace: matrix
  labels:
    app.kubernetes.io/name: mas
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mas
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mas
  namespace: matrix
  labels:
    app.kubernetes.io/name: mas
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mas
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mas
    spec:
      # Same hairpin workaround as Synapse: route the auth host to the in-pod
      # nginx sidecar (listen :443, LE cert) so MAS' upstream-OIDC discovery
      # + backchannel reaches Authentik via the cluster network, never via
      # the Cilium LB-gateway.
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - auth.merry.seilliebert.dev
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Templates the CNPG-managed postgres password into a small MAS config
        # snippet, merged at runtime via a second --config flag. MAS' database
        # section does not support password_file, so we inline the password
        # here (file stays inside the pod's emptyDir).
        - name: render-db-config
          image: docker.io/library/busybox:1.37
          command:
            - sh
            - -c
            - 'printf "database:\n  password: \"%s\"\n" "$(cat /db/password)" > /rendered/db.yaml'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 10m, memory: 8Mi }
            limits: { cpu: 100m, memory: 32Mi }
          volumeMounts:
            - { name: db-password, mountPath: /db, readOnly: true }
            - { name: rendered-config, mountPath: /rendered }
        - name: oidc-proxy
          # renovate: datasource=docker depName=docker.io/nginxinc/nginx-unprivileged
          image: docker.io/nginxinc/nginx-unprivileged:1.31-alpine
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - name: oidc-tls
              containerPort: 443
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: 443
            periodSeconds: 1
            failureThreshold: 30
          volumeMounts:
            - name: oidc-proxy-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: oidc-proxy-tls
              mountPath: /tls
              readOnly: true
            - name: oidc-proxy-tmp
              mountPath: /tmp
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 200m, memory: 64Mi }
      containers:
        - name: mas
          # renovate: datasource=docker depName=ghcr.io/element-hq/matrix-authentication-service
          image: ghcr.io/element-hq/matrix-authentication-service:1.19.0
          args:
            - server
            - --config=/config/config.yaml
            - --config=/rendered/db.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: rendered-config
              mountPath: /rendered
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mas-config
        - name: secrets
          secret:
            secretName: mas-secrets
        # CNPG-managed credentials: only read by the render-db-config init
        - name: db-password
          secret:
            secretName: mas-postgres-credentials
            items:
              - key: password
                path: password
        - name: rendered-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: oidc-proxy-conf
          configMap:
            name: mas-oidc-proxy
        - name: oidc-proxy-tls
          secret:
            secretName: auth-oidc-tls
        - name: oidc-proxy-tmp
          emptyDir: {}
