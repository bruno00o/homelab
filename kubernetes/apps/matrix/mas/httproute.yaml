---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mas
  namespace: matrix
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https-merry-wildcard
  hostnames:
    - mas.${PUBLIC_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mas
          port: 8080
