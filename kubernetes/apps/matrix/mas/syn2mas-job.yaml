---
# Migrate Synapse users/devices/tokens into MAS. Idempotent at the start
# (writes to a transactional MAS DB; first run wins, subsequent re-runs become
# no-ops once the migration table is marked complete). Requires Synapse to be
# SHUT DOWN at run time — see docs/runbook-mas-migration.md. In GitOps we
# accept that Synapse may still be Running here: the Job will exit non-zero
# and retry. Re-running once Synapse is scaled to 0 is the supported path.
apiVersion: batch/v1
kind: Job
metadata:
  name: syn2mas-migrate
  namespace: matrix
  annotations:
    # Re-run when manifest is updated (bump this if we need to retry).
    syn2mas/revision: "1"
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syn2mas
        job-name: syn2mas-migrate
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: syn2mas
          # renovate: datasource=docker depName=ghcr.io/element-hq/matrix-authentication-service
          image: ghcr.io/element-hq/matrix-authentication-service:1.18.0
          args:
            - syn2mas
            - migrate
            - --config=/config/config.yaml
            - --synapse-config=/synapse/homeserver.yaml
          env:
            - name: SSL_CERT_FILE
              value: /tls/ca.crt
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: secrets, mountPath: /secrets, readOnly: true }
            - { name: db-password, mountPath: /db, readOnly: true }
            - { name: synapse-config, mountPath: /synapse, readOnly: true }
            - { name: tls-ca, mountPath: /tls, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: config
          configMap:
            name: mas-config
        - name: secrets
          secret:
            secretName: mas-secrets
        - name: db-password
          secret:
            secretName: mas-postgres-credentials
            items:
              - key: password
                path: password
        - name: synapse-config
          configMap:
            name: synapse-config
        - name: tls-ca
          secret:
            secretName: auth-oidc-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: tmp
          emptyDir: {}
