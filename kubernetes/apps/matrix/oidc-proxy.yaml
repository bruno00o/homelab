---
# Valid LE cert for auth.merry.seilliebert.dev, used by the in-pod nginx sidecar
# in MAS (and previously Synapse, now retired). Lets MAS' upstream-OIDC
# backchannel reach Authentik over HTTPS bypassing the Cilium LB-gateway hairpin.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-oidc-tls
  namespace: matrix
spec:
  secretName: auth-oidc-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - auth.merry.seilliebert.dev
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
