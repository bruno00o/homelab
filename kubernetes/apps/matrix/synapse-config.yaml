apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-config
  namespace: matrix
data:
  homeserver.yaml: |
    server_name: "matrix.merry.seilliebert.dev"
    public_baseurl: "https://matrix.merry.seilliebert.dev/"
    pid_file: /data/homeserver.pid
    signing_key_path: "/data/signing.key"
    report_stats: false
    log_config: "/config/log.config"

    listeners:
      - port: 8008
        tls: false
        type: http
        x_forwarded: true
        bind_addresses: ['0.0.0.0']
        resources:
          - names: [client]
            compress: false

    media_store_path: /data/media_store
    max_upload_size: "50M"

    # Federation OFF (empty whitelist = federate with nobody).
    federation_domain_whitelist: []
    trusted_key_servers: []
    suppress_key_server_warning: true

    # Closed registration: humans go through MAS (which itself delegates to
    # Authentik upstream OIDC). Local Synapse registration disabled.
    enable_registration: false

    # Delegate auth to MAS. Synapse no longer handles OIDC or passwords
    # directly — MAS is the OAuth2 client of Authentik and Synapse trusts MAS
    # via the shared secret. Endpoint is in-cluster (HTTP, behind netpol).
    matrix_authentication_service:
      enabled: true
      endpoint: http://mas.matrix.svc.cluster.local:8080/
      secret_path: /mas-secrets/matrix_shared_secret
  log.config: |
    version: 1
    formatters:
      precise:
        format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: precise
    loggers:
      synapse.storage.SQL:
        level: INFO
    root:
      level: INFO
      handlers: [console]
    disable_existing_loggers: false
