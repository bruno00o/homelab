---
apiVersion: v1
kind: Service
metadata:
  name: synapse
  namespace: matrix
  labels:
    app.kubernetes.io/name: synapse
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: synapse
  ports:
    - name: http
      port: 8008
      targetPort: 8008
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: synapse
  namespace: matrix
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  serviceName: synapse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: synapse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synapse
    spec:
      # Resolve the auth host to the in-pod nginx sidecar (pod-only; browsers are
      # unaffected). Lets Synapse's OIDC backchannel skip the Cilium LB hairpin.
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - auth.merry.seilliebert.dev
      securityContext:
        runAsNonRoot: true
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Generate the signing key onto the PVC if missing (federation off, so
        # this key only needs to be stable for local tokens).
        - name: generate-signing-key
          # renovate: datasource=docker depName=ghcr.io/element-hq/synapse
          image: ghcr.io/element-hq/synapse:v1.153.0
          command:
            - sh
            - -c
            - >-
              test -f /data/signing.key ||
              python -m synapse.app.homeserver
              --config-path /config/homeserver.yaml
              --config-path /secrets/extra.yaml
              --generate-keys
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: secrets, mountPath: /secrets }
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
      containers:
        - name: synapse
          # renovate: datasource=docker depName=ghcr.io/element-hq/synapse
          image: ghcr.io/element-hq/synapse:v1.153.0
          command: ["python", "-m", "synapse.app.homeserver"]
          args:
            - --config-path
            - /config/homeserver.yaml
            - --config-path
            - /secrets/extra.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8008
              protocol: TCP
          env:
            - name: TZ
              value: ${TIMEZONE}
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: secrets, mountPath: /secrets }
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /health, port: 8008 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8008 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { cpu: 2000m, memory: 2Gi }
        # TLS sidecar: terminates https with a valid LE cert for the auth host
        # and forwards to the Authentik service, so the OIDC backchannel avoids
        # the Cilium LB-gateway hairpin entirely.
        - name: oidc-proxy
          # renovate: datasource=docker depName=docker.io/nginxinc/nginx-unprivileged
          image: docker.io/nginxinc/nginx-unprivileged:1.31-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: oidc-tls
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: oidc-proxy-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: oidc-proxy-tls
              mountPath: /tls
              readOnly: true
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 200m, memory: 64Mi }
      volumes:
        - name: config
          configMap:
            name: synapse-config
        - name: secrets
          secret:
            secretName: synapse-secrets
        - name: oidc-proxy-conf
          configMap:
            name: synapse-oidc-proxy
        - name: oidc-proxy-tls
          secret:
            secretName: auth-oidc-tls
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ${DEFAULT_STORAGE_CLASS}
        resources:
          requests:
            storage: 10Gi
