apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: random-gif-public
  namespace: random-gif
spec:
  endpoints:
    - dnsName: random-gif.seilliebert.dev
      recordType: CNAME
      targets:
        - ${CF_TUNNEL_HOSTNAME}
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
