apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: random-gif
  namespace: random-gif
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  values:
    controllers:
      random-gif:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            # renovate: datasource=docker depName=ghcr.io/bruno00o/random-gif
            image:
              repository: ghcr.io/bruno00o/random-gif
              tag: "1.2.0"
            env:
              TZ: ${TIMEZONE}
              PORT: "8080"
              URL_API: http://localhost:8080
              DATABASE_PATH: /app/data/random-gif.db
              BOT_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: random-gif-secrets
                    key: bot_token
              CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: random-gif-secrets
                    key: client_id
              TENOR_KEY:
                valueFrom:
                  secretKeyRef:
                    name: random-gif-secrets
                    key: tenor_key
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /
                port: 8080
              readiness:
                enabled: true
                type: HTTP
                path: /
                port: 8080
            resources:
              requests:
                cpu: 20m
                memory: 96Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: random-gif
        ports:
          http:
            port: 8080

    persistence:
      data:
        storageClass: ${DEFAULT_STORAGE_CLASS}
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/data
