apiVersion: autokuma.bigboot.dev/v1
kind: KumaEntity
metadata:
  name: random-gif
  namespace: random-gif
spec:
  config:
    type: http
    name: Random GIF
    url: https://random-gif.${CLUSTER_DOMAIN}
    interval: 60
    ignore_tls: true
    accepted_statuscodes:
      - "200-299"
      - "300-399"
      - "400-499"
