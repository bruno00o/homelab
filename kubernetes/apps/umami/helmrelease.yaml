apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: umami
  namespace: umami
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  dependsOn:
    - name: cloudnative-pg
      namespace: cnpg-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  values:
    controllers:
      umami:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            # renovate: datasource=docker depName=ghcr.io/umami-software/umami
            image:
              repository: ghcr.io/umami-software/umami
              tag: "3.1.0"
            env:
              TZ: ${TIMEZONE}
              DATABASE_TYPE: postgresql
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: umami-postgres-app
                    key: uri
              APP_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: umami-secrets
                    key: app_secret
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/heartbeat
                port: 3000
              readiness:
                enabled: true
                type: HTTP
                path: /api/heartbeat
                port: 3000
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 768Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: umami
        ports:
          http:
            port: 3000
