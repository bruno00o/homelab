---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: umami
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: umami
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-gateway
  namespace: umami
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: umami
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock: { cidr: 10.0.20.0/24 }
      ports:
        - { protocol: TCP, port: 3000 }
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-proxy-ingress
  namespace: umami
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: umami
  ingress:
    - fromEntities: [ingress]
      toPorts:
        - ports:
            - { port: "3000", protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-cloudflare-tunnel
  namespace: umami
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: umami
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudflare-tunnel
      ports:
        - { protocol: TCP, port: 3000 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-cnpg-operator
  namespace: umami
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: umami-postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - { protocol: TCP, port: 5432 }
        - { protocol: TCP, port: 8000 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-postgres
  namespace: umami
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: umami
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: umami-postgres
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: umami
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: umami-postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: umami
      ports:
        - { protocol: TCP, port: 5432 }
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: umami-postgres
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress
  namespace: umami
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: umami-postgres
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - ports:
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 6443 }
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: umami-postgres
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-postgres
  namespace: umami
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: umami-postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - { protocol: TCP, port: 9187 }
