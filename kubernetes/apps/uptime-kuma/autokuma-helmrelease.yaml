apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: autokuma
  namespace: uptime-kuma
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  values:
    controllers:
      autokuma:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        serviceAccount:
          name: autokuma
        containers:
          app:
            # renovate: datasource=docker depName=ghcr.io/bigboot/autokuma
            image:
              repository: ghcr.io/bigboot/autokuma
              tag: "2.0.0"
            env:
              TZ: ${TIMEZONE}
              HOME: /tmp
              RUST_LOG: info
              AUTOKUMA__KUMA__URL: http://uptime-kuma:3001
              AUTOKUMA__KUBERNETES__ENABLED: "true"
              AUTOKUMA__DOCKER__ENABLED: "false"
              AUTOKUMA__FILES__ENABLED: "false"
              AUTOKUMA__KUMA__USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: autokuma-secrets
                    key: username
              AUTOKUMA__KUMA__PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: autokuma-secrets
                    key: password
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 200m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
