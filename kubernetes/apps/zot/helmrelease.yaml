apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: zot
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  values:
    controllers:
      zot:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            # renovate: datasource=docker depName=ghcr.io/project-zot/zot
            image:
              repository: ghcr.io/project-zot/zot
              tag: v2.1.16
            args:
              - serve
              - /etc/zot/config.json
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness:
                enabled: true
                type: TCP
                port: 5000
              readiness:
                enabled: true
                type: TCP
                port: 5000
              startup:
                enabled: true
                type: TCP
                port: 5000
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                cpu: 1000m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: zot
        ports:
          http:
            port: 5000

    persistence:
      data:
        storageClass: ${DEFAULT_STORAGE_CLASS}
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /var/lib/registry
      config:
        type: configMap
        name: zot-config
        globalMounts:
          - path: /etc/zot/config.json
            subPath: config.json
            readOnly: true
      htpasswd:
        type: secret
        name: zot-htpasswd
        globalMounts:
          - path: /secret/htpasswd
            subPath: htpasswd
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
