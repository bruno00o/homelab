            namespace: home-automation
      allowedRoutes:
        namespaces:
          from: All
    - name: https-zigbee2mqtt
      protocol: HTTPS
      port: 443
      hostname: zigbee2mqtt.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: zigbee2mqtt-tls
            namespace: home-automation
      allowedRoutes:
        namespaces:
          from: All
    - name: https-random-gif
      protocol: HTTPS
      port: 443
      hostname: random-gif.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: random-gif-tls
            namespace: random-gif
      allowedRoutes:
        namespaces:
          from: All
    - name: https-uptime-kuma
      protocol: HTTPS
      port: 443
      hostname: uptime.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: uptime-kuma-tls
            namespace: uptime-kuma
      allowedRoutes:
        namespaces:
          from: All
    - name: https-aroma
      protocol: HTTPS
      port: 443
      hostname: aroma.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: aroma-tls
            namespace: aroma
      allowedRoutes:
        namespaces:
          from: All
    - name: https-pb-aroma
      protocol: HTTPS
      port: 443
      hostname: pb-aroma.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: pb-aroma-tls
            namespace: aroma
      allowedRoutes:
        namespaces:
          from: All
    - name: https-umami
      protocol: HTTPS
      port: 443
      hostname: umami.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: umami-tls
            namespace: umami
      allowedRoutes:
        namespaces:
          from: All
    - name: https-zot
      protocol: HTTPS
      port: 443
      hostname: zot.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
