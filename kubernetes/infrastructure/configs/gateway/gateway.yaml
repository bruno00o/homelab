      protocol: HTTPS
      port: 443
      hostname: lightrag.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: lightrag-tls
            namespace: gaspard
      allowedRoutes:
        namespaces:
          from: All
    - name: https-immich
      protocol: HTTPS
      port: 443
      hostname: immich.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: immich-tls
            namespace: immich
      allowedRoutes:
        namespaces:
          from: All
    - name: http-ca-portal
      protocol: HTTP
      port: 80
      hostname: ca.${CLUSTER_DOMAIN}
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-gateway
  namespace: kube-system
  annotations:
    io.cilium/lb-ipam-ips: ${LB_EXTERNAL_GATEWAY}
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https-auth
      protocol: HTTPS
      port: 443
      hostname: auth.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: authentik-tls
            namespace: authentik
      allowedRoutes:
        namespaces:
          from: All
    - name: https-home-assistant
      protocol: HTTPS
      port: 443
      hostname: home-assistant.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: home-assistant-tls
            namespace: home-automation
      allowedRoutes:
        namespaces:
          from: All
    - name: https-homarr
      protocol: HTTPS
      port: 443
      hostname: homarr.${CLUSTER_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: homarr-tls
            namespace: homarr
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: internal-http-to-https-redirect
  namespace: kube-system
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-http-to-https-redirect
  namespace: kube-system
spec:
  parentRefs:
    - name: external-gateway
      namespace: kube-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
