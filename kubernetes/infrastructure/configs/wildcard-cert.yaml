---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-seilliebert-app
  namespace: kube-system
spec:
  secretName: wildcard-seilliebert-app-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: seilliebert.app
  dnsNames:
    - seilliebert.app
    - "*.seilliebert.app"
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
