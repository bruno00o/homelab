apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  timeout: 10m

  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 1h

  install:
    crds: CreateReplace
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  uninstall:
    keepHistory: false

  values:
    fullnameOverride: external-dns

    provider:
      name: cloudflare

    sources:
      - crd

    policy: upsert-only

    txtOwnerId: going-merry
    txtPrefix: "_externaldns."

    domainFilters:
      - seilliebert.dev

    extraArgs:
      - --cloudflare-proxied

    interval: 1m
    triggerLoopOnEvent: true

    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65534
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault

    podSecurityContext:
      fsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    serviceMonitor:
      enabled: false
