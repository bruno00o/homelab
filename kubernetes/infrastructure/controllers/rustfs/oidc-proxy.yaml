---
# Valid LE cert for auth.merry.seilliebert.dev, used by the in-pod nginx sidecar
# so RustFS's native OIDC backchannel reaches Authentik directly (bypassing the
# Cilium LB-gateway hairpin) over HTTPS with a cert rustls trusts natively.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-oidc-tls
  namespace: rustfs
spec:
  secretName: auth-oidc-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - auth.merry.seilliebert.dev
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rustfs-oidc-proxy
  namespace: rustfs
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    events {}
    http {
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      # Listens on 443 so RustFS (which follows the port-less discovery endpoints)
      # reaches the sidecar via hostAlias auth.merry.seilliebert.dev -> 127.0.0.1.
      server {
        listen 443 ssl;
        http2 on;
        server_name auth.merry.seilliebert.dev;
        ssl_certificate /tls/tls.crt;
        ssl_certificate_key /tls/tls.key;
        # Rewrite ONLY the browser-facing endpoints (authorize + logout) in the
        # OIDC discovery document to the internal auth host, so the SSO redirect
        # stays on the LAN (auth.merry.home.arpa, mugiwara cert trusted by
        # browsers). The backchannel endpoints (issuer/token/jwks/userinfo) keep
        # the seilliebert.dev host so RustFS/rustls still trusts the LE cert.
        # Accept-Encoding is cleared so sub_filter sees an uncompressed body.
        sub_filter_once off;
        sub_filter_types application/json;
        location / {
          proxy_pass http://authentik-server.authentik.svc.cluster.local:80;
          proxy_set_header Host auth.merry.seilliebert.dev;
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header X-Forwarded-Host auth.merry.seilliebert.dev;
          proxy_set_header X-Forwarded-For $remote_addr;
          proxy_set_header Accept-Encoding "";
          sub_filter '"https://auth.merry.seilliebert.dev/application/o/authorize/"'
                     '"https://auth.merry.home.arpa/application/o/authorize/"';
          sub_filter '"https://auth.merry.seilliebert.dev/application/o/rustfs/end-session/"'
                     '"https://auth.merry.home.arpa/application/o/rustfs/end-session/"';
        }
      }
    }
