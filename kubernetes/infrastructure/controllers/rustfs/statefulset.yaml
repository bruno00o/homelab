---
apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: rustfs
  labels:
    app.kubernetes.io/name: rustfs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rustfs
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
  namespace: rustfs
  labels:
    app.kubernetes.io/name: rustfs
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  serviceName: rustfs
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rustfs
          # renovate: datasource=docker depName=rustfs/rustfs
          image: docker.io/rustfs/rustfs:1.0.0-beta.3
          args:
            - /data
          env:
            - name: RUSTFS_ADDRESS
              value: ":9000"
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
            # OIDC (Authentik)
            - name: RUSTFS_IDENTITY_OPENID_ENABLE
              value: "on"
            - name: RUSTFS_IDENTITY_OPENID_CONFIG_URL
              value: "https://auth.${CLUSTER_DOMAIN}/application/o/rustfs/.well-known/openid-configuration"
            - name: RUSTFS_IDENTITY_OPENID_CLIENT_ID
              value: "rustfs"
            - name: RUSTFS_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rustfs-oidc-credentials
                  key: client_secret
            - name: RUSTFS_IDENTITY_OPENID_SCOPES
              value: "openid,email,profile,groups"
            - name: RUSTFS_IDENTITY_OPENID_CLAIM_NAME
              value: "groups"
            - name: RUSTFS_IDENTITY_OPENID_ROLE_POLICY
              value: "consoleAdmin"
            - name: RUSTFS_IDENTITY_OPENID_DISPLAY_NAME
              value: "Authentik"
            - name: RUSTFS_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC
              value: "on"
          ports:
            - name: s3
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${DEFAULT_STORAGE_CLASS}
        resources:
          requests:
            storage: 50Gi
