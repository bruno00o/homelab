---
apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: rustfs
  labels:
    app.kubernetes.io/name: rustfs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rustfs
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
  namespace: rustfs
  labels:
    app.kubernetes.io/name: rustfs
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  serviceName: rustfs
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
    spec:
      # Resolve the auth host to the in-pod nginx sidecar (pod-only; browsers are
      # unaffected) so RustFS's OIDC backchannel skips the Cilium LB hairpin.
      # Internal host (home.arpa) keeps the whole flow same-site with the console
      # (rustfs.merry.home.arpa) and matches AUTHENTIK_HOST_BROWSER, so the
      # authentik_session cookie survives the redirect (no "session expired").
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - auth.merry.home.arpa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # Native sidecar (k8s 1.29+): the proxy starts and passes its startupProbe
      # BEFORE the rustfs container, so RustFS's one-shot OIDC discovery at boot
      # never races an unready nginx (which produced "discovery failed: Request
      # failed" and then disabled the SSO login button for good).
      initContainers:
        # TLS sidecar: terminates https with a valid LE cert for the auth host
        # and forwards to the Authentik service, so RustFS's OIDC backchannel
        # avoids the Cilium LB-gateway hairpin. Listens on 443 (NET_BIND_SERVICE)
        # because RustFS follows the port-less discovery endpoints.
        - name: oidc-proxy
          # renovate: datasource=docker depName=docker.io/nginxinc/nginx-unprivileged
          image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - name: oidc-tls
              containerPort: 443
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: 443
            periodSeconds: 1
            failureThreshold: 30
          volumeMounts:
            - name: oidc-proxy-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: oidc-proxy-tls
              mountPath: /tls
              readOnly: true
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 200m, memory: 64Mi }
      containers:
        - name: rustfs
          # renovate: datasource=docker depName=rustfs/rustfs
          image: docker.io/rustfs/rustfs:1.0.0-beta.8
          args:
            - /data
          env:
            - name: RUSTFS_ADDRESS
              value: ":9000"
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
            # Native OIDC (Authentik) for the console — removes the second login.
            # Backchannel (config_url) goes to the in-pod sidecar via hostAlias.
            # SSL_CERT_FILE points rustls at the mugiwara CA so it trusts the
            # sidecar's internal cert for auth.merry.home.arpa.
            - name: SSL_CERT_FILE
              value: /etc/ssl/mugiwara/ca.crt
            - name: RUSTFS_IDENTITY_OPENID_ENABLE
              value: "true"
            - name: RUSTFS_IDENTITY_OPENID_CONFIG_URL
              value: "https://auth.merry.home.arpa/application/o/rustfs/.well-known/openid-configuration"
            - name: RUSTFS_IDENTITY_OPENID_CLIENT_ID
              value: "rustfs"
            - name: RUSTFS_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rustfs-oidc
                  key: client-secret
            - name: RUSTFS_IDENTITY_OPENID_SCOPES
              value: "openid,profile,email"
            - name: RUSTFS_IDENTITY_OPENID_ROLE_POLICY
              value: "consoleAdmin"
            - name: RUSTFS_IDENTITY_OPENID_DISPLAY_NAME
              value: "SSO (Authentik)"
            # Backend OIDC callback, with the PROVIDER ID suffix ('default'). Per
            # rustfs#2924: only /callback/<provider_id> is on the unauthenticated
            # allowlist; the providerless /callback hits the SigV4 admin check and
            # returns "AccessDenied: Signature is required". provider_id = the last
            # segment of rustfs's authorize URL (logs say OIDC provider 'default').
            - name: RUSTFS_IDENTITY_OPENID_REDIRECT_URI
              value: "https://rustfs.${CLUSTER_DOMAIN}/rustfs/admin/v3/oidc/callback/default"
            - name: RUSTFS_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC
              value: "false"
          ports:
            - name: s3
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
            - name: tmp
              mountPath: /tmp
            - name: mugiwara-ca
              mountPath: /etc/ssl/mugiwara
              readOnly: true
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: oidc-proxy-conf
          configMap:
            name: rustfs-oidc-proxy
        - name: oidc-proxy-tls
          secret:
            secretName: auth-oidc-tls
        # ca.crt from the cert-manager-issued auth-oidc-tls secret = the mugiwara
        # CA, mounted so rustls (SSL_CERT_FILE) trusts the sidecar's internal cert.
        - name: mugiwara-ca
          secret:
            secretName: auth-oidc-tls
            items:
              - key: ca.crt
                path: ca.crt
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${DEFAULT_STORAGE_CLASS}
        resources:
          requests:
            storage: 50Gi
