---
apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: rustfs
  labels:
    app.kubernetes.io/name: rustfs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rustfs
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
  namespace: rustfs
  labels:
    app.kubernetes.io/name: rustfs
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  serviceName: rustfs
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
    spec:
      # Point the auth host at the in-pod sidecar (pod-only) so the OIDC
      # backchannel skips the Cilium LB hairpin. home.arpa keeps the browser flow
      # same-site with the console + matches AUTHENTIK_HOST_BROWSER (else the
      # authentik_session cookie is lost → "session expired").
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - auth.merry.home.arpa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # Native sidecar (k8s 1.29+): starts and passes its startupProbe BEFORE
      # rustfs, so rustfs's one-shot OIDC discovery at boot can't race an unready
      # nginx (which left the SSO button disabled). TLS proxy config: oidc-proxy.yaml.
      initContainers:
        - name: oidc-proxy
          # renovate: datasource=docker depName=docker.io/nginxinc/nginx-unprivileged
          image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - name: oidc-tls
              containerPort: 443
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: 443
            periodSeconds: 1
            failureThreshold: 30
          volumeMounts:
            - name: oidc-proxy-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: oidc-proxy-tls
              mountPath: /tls
              readOnly: true
            # nginx.conf points pid + temp paths here; needed under readOnlyRootFilesystem.
            - name: oidc-proxy-tmp
              mountPath: /tmp
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 200m, memory: 64Mi }
      containers:
        - name: rustfs
          # renovate: datasource=docker depName=rustfs/rustfs
          image: docker.io/rustfs/rustfs:1.0.0-beta.8
          args:
            - /data
          env:
            - name: RUSTFS_ADDRESS
              value: ":9000"
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
            # Native OIDC (Authentik) for the console, no second login. Backchannel
            # goes to the sidecar via hostAlias; SSL_CERT_FILE makes rustls trust
            # the sidecar's mugiwara cert.
            - name: SSL_CERT_FILE
              value: /etc/ssl/mugiwara/ca.crt
            - name: RUSTFS_IDENTITY_OPENID_ENABLE
              value: "true"
            - name: RUSTFS_IDENTITY_OPENID_CONFIG_URL
              value: "https://auth.merry.home.arpa/application/o/rustfs/.well-known/openid-configuration"
            - name: RUSTFS_IDENTITY_OPENID_CLIENT_ID
              value: "rustfs"
            - name: RUSTFS_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rustfs-oidc
                  key: client-secret
            - name: RUSTFS_IDENTITY_OPENID_SCOPES
              value: "openid,profile,email"
            - name: RUSTFS_IDENTITY_OPENID_ROLE_POLICY
              value: "consoleAdmin"
            - name: RUSTFS_IDENTITY_OPENID_DISPLAY_NAME
              value: "SSO (Authentik)"
            # Callback MUST carry the provider id ('default'): only
            # /callback/<provider_id> is on rustfs's unauthenticated allowlist; the
            # providerless path hits the SigV4 check → "Signature is required" (rustfs#2924).
            - name: RUSTFS_IDENTITY_OPENID_REDIRECT_URI
              value: "https://rustfs.${CLUSTER_DOMAIN}/rustfs/admin/v3/oidc/callback/default"
            - name: RUSTFS_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC
              value: "false"
          ports:
            - name: s3
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
            - name: tmp
              mountPath: /tmp
            - name: mugiwara-ca
              mountPath: /etc/ssl/mugiwara
              readOnly: true
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: oidc-proxy-conf
          configMap:
            name: rustfs-oidc-proxy
        - name: oidc-proxy-tmp
          emptyDir: {}
        - name: oidc-proxy-tls
          secret:
            secretName: auth-oidc-tls
        # ca.crt of the auth-oidc-tls secret = the mugiwara CA (see SSL_CERT_FILE).
        - name: mugiwara-ca
          secret:
            secretName: auth-oidc-tls
            items:
              - key: ca.crt
                path: ca.crt
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${DEFAULT_STORAGE_CLASS}
        resources:
          requests:
            storage: 50Gi
