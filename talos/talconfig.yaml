---
clusterName: going-merry
endpoint: https://10.0.20.10:6443
talosVersion: v1.12.6
kubernetesVersion: v1.35.3
cniConfig:
  name: none
allowSchedulingOnControlPlanes: false

additionalApiServerCertSans:
  - 10.0.20.10
additionalMachineCertSans:
  - 10.0.20.10
  - 10.0.20.11
  - 10.0.20.12
  - 10.0.20.13
  - 10.0.20.14
  - 10.0.20.15
  - 10.0.20.16

nodes:
  # --- Control Plane ---
  - hostname: luffy
    ipAddress: 10.0.20.11
    controlPlane: true
    installDiskSelector:
      model: CT500P310SSD8
    networkInterfaces:
      - interface: enp1s0
        dhcp: true
        vip:
          ip: 10.0.20.10

  - hostname: zoro
    ipAddress: 10.0.20.12
    controlPlane: true
    installDiskSelector:
      model: CT500P310SSD8
    networkInterfaces:
      - interface: enp1s0
        dhcp: true
        vip:
          ip: 10.0.20.10

  - hostname: nami
    ipAddress: 10.0.20.13
    controlPlane: true
    installDiskSelector:
      model: CT500P310SSD8
    networkInterfaces:
      - interface: enp1s0
        dhcp: true
        vip:
          ip: 10.0.20.10

  # --- Workers ---
  - hostname: usopp
    ipAddress: 10.0.20.14
    controlPlane: false
    installDiskSelector:
      model: CT2000T500SSD8
    networkInterfaces:
      - interface: enp1s0
        dhcp: true

  - hostname: sanji
    ipAddress: 10.0.20.15
    controlPlane: false
    installDiskSelector:
      model: CT2000T500SSD8
    networkInterfaces:
      - interface: enp1s0
        dhcp: true

  - hostname: chopper
    ipAddress: 10.0.20.16
    controlPlane: false
    installDiskSelector:
      model: CT2000T500SSD8
    networkInterfaces:
      - interface: enp1s0
        dhcp: true

# =============================================================================
# Global patches (all nodes)
# =============================================================================
patches:
  - |-
    machine:
      network:
        nameservers:
          - 1.1.1.1
          - 9.9.9.9
      features:
        hostDNS:
          enabled: true
          forwardKubeDNSToHost: false
  - |-
    machine:
      kubelet:
        extraArgs:
          rotate-server-certificates: true
        extraConfig:
          serializeImagePulls: false
  - |-
    machine:
      files:
        - path: /etc/cri/conf.d/20-customization.part
          op: create
          content: |
            [plugins."io.containerd.cri.v1.images"]
              discard_unpacked_layers = false

# =============================================================================
# Control Plane patches
# =============================================================================
controlPlane:
  patches:
    - |-
      cluster:
        proxy:
          disabled: true
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
        apiServer:
          admissionControl:
            - name: PodSecurity
              configuration:
                apiVersion: pod-security.admission.config.k8s.io/v1beta1
                kind: PodSecurityConfiguration
                exemptions:
                  namespaces:
                    - longhorn-system
                    - monitoring
        extraManifests:
          - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/main/deploy/standalone-install.yaml
          - https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.8.1/components.yaml
    - |-
      machine:
        kubelet:
          extraMounts:
            - destination: /var/lib/longhorn
              type: bind
              source: /var/lib/longhorn
              options:
                - bind
                - rshared
                - rw
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/intel-ucode
          - siderolabs/i915
          - siderolabs/iscsi-tools
          - siderolabs/util-linux-tools

# =============================================================================
# Worker patches
# =============================================================================
worker:
  patches:
    - |-
      machine:
        nodeLabels:
          node.longhorn.io/create-default-disk: "true"
    - |-
      apiVersion: v1alpha1
      kind: VolumeConfig
      name: EPHEMERAL
      provisioning:
        maxSize: 100GiB
    - |-
      apiVersion: v1alpha1
      kind: UserVolumeConfig
      name: longhorn
      provisioning:
        diskSelector:
          match: system_disk
        minSize: 200GiB
        grow: true
    - |-
      machine:
        kubelet:
          extraMounts:
            - destination: /var/lib/longhorn
              type: bind
              source: /var/lib/longhorn
              options:
                - bind
                - rshared
                - rw
            - destination: /var/mnt/longhorn
              type: bind
              source: /var/mnt/longhorn
              options:
                - bind
                - rshared
                - rw
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/intel-ucode
          - siderolabs/i915
          - siderolabs/iscsi-tools
          - siderolabs/util-linux-tools
